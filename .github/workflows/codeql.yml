name: CodeQL Analysis

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'assets/**'
      - 'docs/**'
      - '.gitignore'
      - '.editorconfig'
      - '.gitattributes'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'assets/**'
      - 'docs/**'
      - '.gitignore'
      - '.editorconfig'
      - '.gitattributes'
  schedule:
    - cron: '30 1 * * 6' # Saturdays at 1:30 AM
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL Semantic Audit
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'csharp', 'javascript-typescript' ]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Setup .NET SDK (For C# builds)
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
          cache: true
          cache-dependency-path: PCBuilder.sln

      - name: Restore C# Dependencies
        if: matrix.language == 'csharp'
        run: dotnet restore PCBuilder.sln

      - name: Build C# Code (Optimized for CodeQL Speed)
        if: matrix.language == 'csharp'
        run: dotnet build PCBuilder.sln --no-restore -c Debug /p:RunAnalyzers=false /p:CreateDocumentationFile=false /p:GeneratePackageOnBuild=false

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

